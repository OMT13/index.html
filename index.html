<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مرجع مصطلحات Dip IFRS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Tajawal:wght@400;500;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --card: #1e2335;
    --border: #2a3050;
    --accent: #4f8ef7;
    --accent2: #7c5cbf;
    --gold: #e2a84b;
    --text: #d4daf0;
    --muted: #7a84a6;
    --green: #3ecf8e;
    --red: #f75f5f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    padding: 20px 16px 60px;
  }

  header {
    text-align: center;
    padding: 32px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }

  .logo-line {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
    padding: 6px 14px;
    transition: all 0.2s;
  }

  .filter-btn.active, .filter-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .stats {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    text-align: right;
    font-family: 'IBM Plex Mono', monospace;
  }

  .grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--tag-color, var(--accent));
    border-radius: 0 12px 12px 0;
  }

  .card:hover { border-color: var(--accent); transform: translateX(-2px); }
  .card.expanded { border-color: var(--accent); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .abbr-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    padding: 4px 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    flex: 1;
  }

  .card-arabic {
    font-size: 13px;
    color: var(--gold);
    margin-top: 4px;
  }

  .tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 12px;
    border: 1px solid;
    white-space: nowrap;
  }

  .arrow {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
  }
  .card.expanded .arrow { transform: rotate(90deg); }

  .speak-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 30px;
    height: 30px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--accent);
    font-size: 14px;
    transition: all 0.2s;
  }

  .speak-btn:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    transform: scale(1.08);
  }

  .speak-btn.playing {
    background: var(--accent);
    color: #fff;
    animation: pulse 0.9s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(79,142,247,0.5); }
    50% { box-shadow: 0 0 0 6px rgba(79,142,247,0); }
  }

  .speak-btn-inline {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--accent);
    font-size: 12px;
    padding: 5px 10px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
    font-family: 'Tajawal', sans-serif;
    transition: all 0.2s;
  }

  .speak-btn-inline:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .card-body {
    display: none;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .card.expanded .card-body { display: block; }

  .def-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .def-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.8;
    margin-bottom: 12px;
    direction: rtl;
  }

  .example-box {
    background: var(--bg);
    border-right: 3px solid var(--green);
    border-radius: 0 8px 8px 0;
    padding: 10px 12px;
    font-size: 13px;
    color: #b5c0d8;
    margin-top: 8px;
    line-height: 1.7;
    direction: rtl;
  }

  .example-box strong { color: var(--green); }

  .no-results {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    font-size: 15px;
  }

  /* Tag colors */
  .tag-standard { color: #4f8ef7; border-color: #4f8ef7; }
  .tag-concept  { color: #3ecf8e; border-color: #3ecf8e; }
  .tag-fs       { color: #e2a84b; border-color: #e2a84b; }
  .tag-sopl     { color: #f9a03f; border-color: #f9a03f; }
  .tag-sofp     { color: #38bdf8; border-color: #38bdf8; }
  .tag-measure  { color: #f75f5f; border-color: #f75f5f; }
  .tag-exam     { color: #a78bfa; border-color: #a78bfa; }

  .card[data-cat="standard"] { --tag-color: #4f8ef7; }
  .card[data-cat="concept"]  { --tag-color: #3ecf8e; }
  .card[data-cat="fs"]       { --tag-color: #e2a84b; }
  .card[data-cat="sopl"]     { --tag-color: #f9a03f; }
  .card[data-cat="sofp"]     { --tag-color: #38bdf8; }
  .card[data-cat="measure"]  { --tag-color: #f75f5f; }
  .card[data-cat="exam"]     { --tag-color: #a78bfa; }
</style>
</head>
<body>

<header>
  <div class="logo-line">Dip IFRS · Quick Reference</div>
  <h1>مصطلحات واختصارات IFRS</h1>
  <p class="subtitle">اضغط على أي بطاقة لرؤية التعريف والمثال</p>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="🔍  ابحث بالاختصار أو الاسم الإنجليزي أو العربي..." oninput="render()">
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">الكل</button>
    <button class="filter-btn" onclick="setFilter('standard',this)">المعايير</button>
    <button class="filter-btn" onclick="setFilter('sopl',this)">SOPL بنود</button>
    <button class="filter-btn" onclick="setFilter('sofp',this)">SOFP بنود</button>
    <button class="filter-btn" onclick="setFilter('fs',this)">القوائم (عام)</button>
    <button class="filter-btn" onclick="setFilter('concept',this)">المفاهيم</button>
    <button class="filter-btn" onclick="setFilter('measure',this)">القياس</button>
    <button class="filter-btn" onclick="setFilter('exam',this)">الامتحان</button>
  </div>
</div>

<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>

<script>
const data = [
  // ── STANDARDS ───────────────────────────────────────────────
  { abbr:"IFRS",  en:"International Financial Reporting Standards", ar:"معايير التقارير المالية الدولية", cat:"standard",
    def:"المعايير الدولية الصادرة عن مجلس معايير المحاسبة الدولية (IASB) التي تُلزم الشركات بطريقة موحدة لإعداد قوائمها المالية.",
    ex:"<strong>مثال:</strong> شركة سعودية مدرجة في السوق المالية تُعد قوائمها وفق IFRS بدلاً من المعايير المحلية." },

  { abbr:"IAS",   en:"International Accounting Standards", ar:"معايير المحاسبة الدولية", cat:"standard",
    def:"المعايير القديمة الصادرة قبل 2001 من IASC (السلف لـ IASB). لا تزال سارية المفعول كـ IAS 16, IAS 36...",
    ex:"<strong>فرق رئيسي:</strong> IAS = المعايير القديمة | IFRS = المعايير الجديدة بعد 2001." },

  { abbr:"IAS 1",  en:"Presentation of Financial Statements", ar:"عرض القوائم المالية", cat:"standard",
    def:"يُحدد الحد الأدنى لمحتوى القوائم المالية وشروط عرضها بشكل عادل. ⚠️ تم استبداله بـ IFRS 18 اعتبارًا من 2025.",
    ex:"<strong>للامتحان Dec 2025 / Jun 2026:</strong> IFRS 18 هو المعيار المعمول به الآن بدلًا من IAS 1. راجع IFRS 18 في هذا المرجع." },

  { abbr:"IAS 16", en:"Property, Plant & Equipment", ar:"الممتلكات والآلات والمعدات", cat:"standard",
    def:"يُعالج الاعتراف والقياس والإهلاك والاستبعاد للأصول الثابتة الملموسة طويلة الأمد.",
    ex:"<strong>مثال:</strong> سيارة شُريت بـ 100,000 ر.س. تُهلك على مدى 5 سنوات = إهلاك سنوي 20,000 ر.س." },

  { abbr:"IAS 36", en:"Impairment of Assets", ar:"انخفاض قيمة الأصول", cat:"standard",
    def:"يُلزم المنشأة باختبار الأصول للتأكد أن قيمتها الدفترية لا تتجاوز قيمتها القابلة للاسترداد.",
    ex:"<strong>مثال:</strong> معدة قيمتها الدفترية 50,000 لكن قيمتها القابلة للاسترداد 35,000 → خسارة اضمحلال 15,000." },

  { abbr:"IAS 38", en:"Intangible Assets", ar:"الأصول غير الملموسة", cat:"standard",
    def:"يُعالج الاعتراف والقياس للأصول غير الملموسة كبراءات الاختراع والعلامات التجارية والبرمجيات.",
    ex:"<strong>ملاحظة امتحانية:</strong> نفقات البحث تُحمَّل مباشرة على الدخل، أما نفقات التطوير فتُرسمل إذا استوفت شروط IAS 38." },

  { abbr:"IFRS 9", en:"Financial Instruments", ar:"الأدوات المالية", cat:"standard",
    def:"يُحدد كيفية تصنيف وقياس الأدوات المالية (أسهم، سندات، قروض) وكيفية حساب خسائر الائتمان المتوقعة.",
    ex:"<strong>نماذج القياس:</strong> التكلفة المطفأة | القيمة العادلة عبر الدخل الشامل | القيمة العادلة عبر الربح والخسارة." },

  { abbr:"IFRS 15", en:"Revenue from Contracts with Customers", ar:"الإيراد من العقود مع العملاء", cat:"standard",
    def:"يُحدد طريقة الاعتراف بالإيراد في 5 خطوات تضمن إظهار الإيراد حين يتم نقل السلعة/الخدمة للعميل.",
    ex:"<strong>الخطوات الخمس:</strong> 1) تحديد العقد → 2) تحديد التزامات الأداء → 3) تحديد سعر المعاملة → 4) التخصيص → 5) الاعتراف." },

  { abbr:"IFRS 16", en:"Leases", ar:"عقود الإيجار", cat:"standard",
    def:"يُلزم المستأجر بالاعتراف بجميع عقود الإيجار (أكثر من 12 شهرًا) كأصل حق الاستخدام والتزام إيجار.",
    ex:"<strong>قبل IFRS 16:</strong> الإيجار التشغيلي لا يظهر في الميزانية. <strong>بعده:</strong> يظهر أصل والتزام." },

  { abbr:"IAS 8",  en:"Basis of Preparation of Financial Statements", ar:"أساس إعداد القوائم المالية", cat:"standard",
    def:"يُحدد السياسات المحاسبية وكيفية معالجة التغيرات فيها، والأخطاء المحاسبية، والتغيرات في التقديرات.",
    ex:"<strong>ثلاث حالات:</strong> تغيير سياسة محاسبية (تطبيق بأثر رجعي) | تغيير تقدير (تطبيق مستقبلي) | تصحيح خطأ (تطبيق بأثر رجعي)." },

  { abbr:"IAS 20", en:"Accounting for Government Grants", ar:"المحاسبة عن المنح الحكومية", cat:"standard",
    def:"يُعالج الاعتراف بالمنح الحكومية وكيفية الإفصاح عنها والمساعدات الحكومية الأخرى.",
    ex:"<strong>طريقتان:</strong> عرض المنحة كإيراد مؤجل (Deferred Income) أو خصمها من قيمة الأصل مباشرة." },

  { abbr:"IAS 21", en:"Effects of Changes in Foreign Exchange Rates", ar:"آثار التغيرات في أسعار صرف العملات الأجنبية", cat:"standard",
    def:"يُحدد كيفية تحويل المعاملات والأرصدة بالعملة الأجنبية إلى عملة التقرير، وكيفية ترجمة القوائم المالية للعمليات الأجنبية.",
    ex:"<strong>البنود النقدية</strong> (نقدية، ذمم) تُترجم بسعر الإغلاق → فروق الصرف في P&L.<br><strong>البنود غير النقدية</strong> (PPE) تبقى بالسعر التاريخي." },

  { abbr:"IAS 23", en:"Borrowing Costs", ar:"تكاليف الاقتراض", cat:"standard",
    def:"يُلزم بتحميل تكاليف الاقتراض المتعلقة مباشرةً بإنشاء أو شراء أو إنتاج أصل مؤهَّل على تكلفة ذلك الأصل.",
    ex:"<strong>الأصل المؤهَّل:</strong> أصل يستغرق إعداده للاستخدام أو البيع فترة طويلة (مبنى قيد الإنشاء، مصنع).<br>باقي تكاليف الاقتراض → مصروف في P&L." },

  { abbr:"IAS 24", en:"Related Party Disclosures", ar:"إفصاحات الأطراف ذات الصلة", cat:"standard",
    def:"يُلزم بالإفصاح عن المعاملات والأرصدة مع الأطراف ذات الصلة (أقارب الإدارة، الشركات التابعة، المساهمون الرئيسيون).",
    ex:"<strong>مثال:</strong> بيع منشأة لأصل لشركة يملكها المدير التنفيذي → يجب الإفصاح عن قيمة الصفقة والشروط." },

  { abbr:"IAS 27", en:"Separate Financial Statements", ar:"القوائم المالية المنفصلة", cat:"standard",
    def:"يُنظّم القوائم المالية المنفصلة للشركة الأم حين تختار (أو تُلزَم) بعرض قوائمها بشكل منفصل عن القوائم الموحدة.",
    ex:"<strong>في القوائم المنفصلة:</strong> الاستثمار في التابعة يُقاس بالتكلفة أو بـ FVTPL وفق IFRS 9." },

  { abbr:"IAS 28", en:"Investments in Associates and Joint Ventures", ar:"الاستثمارات في الشركات الزميلة والمشاريع المشتركة", cat:"standard",
    def:"يُحدد محاسبة الاستثمارات في الشركات الزميلة (تأثير ملموس 20-50%) والمشاريع المشتركة باستخدام طريقة حقوق الملكية.",
    ex:"<strong>طريقة حقوق الملكية:</strong> تكلفة الاستثمار + حصة المستثمر في الأرباح − التوزيعات المستلمة." },

  { abbr:"IAS 32", en:"Financial Instruments: Presentation", ar:"الأدوات المالية: العرض", cat:"standard",
    def:"يُحدد كيفية تصنيف الأدوات المالية كحقوق ملكية أو التزامات، وقواعد تقاص الأصول والالتزامات المالية.",
    ex:"<strong>مثال:</strong> الأسهم الممتازة القابلة للاسترداد إلزاميًا = التزام مالي وليس حقوق ملكية رغم اسمها." },

  { abbr:"IAS 40", en:"Investment Property", ar:"العقارات الاستثمارية", cat:"standard",
    def:"يُعالج العقارات المحتفظ بها لتوليد دخل إيجار أو لزيادة القيمة الرأسمالية أو كليهما، لا للاستخدام الذاتي أو البيع.",
    ex:"<strong>نموذجان:</strong> نموذج التكلفة (كـ IAS 16) | نموذج القيمة العادلة (التغير في FV → P&L مباشرة)." },

  { abbr:"IAS 41", en:"Agriculture", ar:"الزراعة", cat:"standard",
    def:"يُعالج محاسبة الأصول البيولوجية (حيوانات ونباتات حية) والإنتاج الزراعي عند نقطة الحصاد.",
    ex:"<strong>الأصول البيولوجية</strong> تُقاس بالقيمة العادلة مطروحًا منها تكاليف البيع. مثال: قطيع أبقار، بستان فاكهة." },

  { abbr:"IFRS 2", en:"Share-based Payment", ar:"الدفع على أساس الأسهم", cat:"standard",

  { abbr:"IFRS 5", en:"Non-current Assets Held for Sale & Discontinued Operations", ar:"الأصول غير المتداولة المحتفظ بها للبيع والعمليات المتوقفة", cat:"standard",
    def:"يُحدد متطلبات تصنيف وقياس الأصول المُزمع بيعها وعرض العمليات المتوقفة في القوائم المالية.",
    ex:"<strong>شروط التصنيف كـ Held for Sale:</strong> متاح للبيع فورًا + البيع مرجح خلال 12 شهرًا → يُقاس بالأدنى من CV أو FV ناقص تكاليف البيع، ويُوقف إهلاكه." },

  { abbr:"IFRS 6", en:"Exploration for and Evaluation of Mineral Resources", ar:"الاستكشاف عن الموارد المعدنية وتقييمها", cat:"standard",

  { abbr:"IFRS 8", en:"Operating Segments", ar:"القطاعات التشغيلية", cat:"standard",
    def:"يُلزم المنشآت المدرجة بالإفصاح عن معلومات قطاعاتها التشغيلية استنادًا إلى التقارير الداخلية المقدمة لصانع القرار الرئيسي.",
    ex:"<strong>مثال:</strong> شركة متعددة الأنشطة (تجزئة + عقارات + مالية) تُفصح عن كل قطاع بإيراداته وأرباحه وأصوله." },

let currentFilter = 'all';
let englishVoice = null;
let activeBtn = null;

function pickVoice() {
  const voices = window.speechSynthesis.getVoices();
  // فضّل صوت إنجليزي (US ثم أي إنجليزي آخر)
  englishVoice =
    voices.find(v => v.lang === 'en-US') ||
    voices.find(v => v.lang && v.lang.startsWith('en')) ||
    null;
}

if ('speechSynthesis' in window) {
  pickVoice();
  window.speechSynthesis.onvoiceschanged = pickVoice;
}

function speak(btn, e) {
  e.stopPropagation();

  if (!('speechSynthesis' in window)) {
    alert('متصفحك لا يدعم خاصية النطق الصوتي. جرّب Chrome أو Edge.');
    return;
  }

  // لو نفس الزر شغال، وقفه
  window.speechSynthesis.cancel();
  if (activeBtn) activeBtn.classList.remove('playing');

  let text = btn.getAttribute('data-text');
  if (btn.getAttribute('data-spell') === '1') {
    // تهجي حرف بحرف مع فواصل لإبطاء النطق
    text = text.split('').join(', ');
  }

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = btn.getAttribute('data-spell') === '1' ? 0.7 : 0.9;
  if (englishVoice) utter.voice = englishVoice;

  utter.onstart = () => {
    activeBtn = btn;
    btn.classList.add('playing');
  };
  utter.onend = utter.onerror = () => {
    btn.classList.remove('playing');
    if (activeBtn === btn) activeBtn = null;
  };

  window.speechSynthesis.speak(utter);
}

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filtered = data.filter(d => {
    const matchCat = currentFilter === 'all' || d.cat === currentFilter;
    const matchQ = !q || d.abbr.toLowerCase().includes(q) || d.en.toLowerCase().includes(q) || d.ar.includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('stats').textContent = `${filtered.length} مصطلح`;

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results">لا توجد نتائج — جرّب بحثًا مختلفًا</div>';
    return;
  }

  const tagMap = { standard:'معيار', concept:'مفهوم', fs:'قائمة مالية (عام)', sopl:'بند SOPL', sofp:'بند SOFP', measure:'قياس', exam:'امتحان' };

  grid.innerHTML = filtered.map((d,i) => `
    <div class="card" data-cat="${d.cat}" onclick="toggle(this)">
      <div class="card-header">
        <div>
          <div class="card-title">${d.en}</div>
          <div class="card-arabic">${d.ar}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <span class="tag tag-${d.cat}">${tagMap[d.cat]}</span>
          <div class="abbr-box">${d.abbr}</div>
          <div class="speak-btn" data-text="${d.en.replace(/"/g,'&quot;')}" onclick="speak(this, event)" title="استمع للنطق الصحيح">🔊</div>
          <span class="arrow">▶</span>
        </div>
      </div>
      <div class="card-body">
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <div class="speak-btn-inline" data-text="${d.en.replace(/"/g,'&quot;')}" onclick="speak(this, event)">🔊 نطق المصطلح كامل</div>
          <div class="speak-btn-inline" data-text="${d.abbr.replace(/"/g,'&quot;')}" data-spell="1" onclick="speak(this, event)">🔤 تهجي الاختصار حرف بحرف</div>
        </div>
        <div class="def-label">التعريف</div>
        <div class="def-text">${d.def}</div>
        <div class="example-box">${d.ex}</div>
      </div>
    </div>
  `).join('');
}

function toggle(card) {
  card.classList.toggle('expanded');
}

render();
</script>
</body>
</html>
